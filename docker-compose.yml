services:
  mock-bank-service:
    image: ghcr.io/onyxpayments/mock-bank-service:latest
    ports:
      - "8001:8000"
    env_file:
      - .env
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  payment-orchestrator-migrations:
    image: ghcr.io/onyxpayments/payment-orchestrator-service:latest
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
    command: ["alembic", "upgrade", "head"]
    depends_on:
      orchestrator-db:
        condition: service_healthy

  payment-orchestrator-service:
    image: ghcr.io/onyxpayments/payment-orchestrator-service:latest
    ports:
      - "8002:8001"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BANK_SERVICE_URL: ${BANK_SERVICE_URL}
      RABBITMQ_HOST: rabbitmq
    depends_on:
      mock-bank-service:
        condition: service_healthy
      payment-orchestrator-migrations:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8001/health/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  payment-orchestrator-worker:
    image: ghcr.io/onyxpayments/payment-orchestrator-service:latest
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BANK_SERVICE_URL: ${BANK_SERVICE_URL}
      RABBITMQ_HOST: rabbitmq
    depends_on:
      mock-bank-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      payment-orchestrator-migrations:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_health"]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 15s

  payment-request-service:
    image: ghcr.io/onyxpayments/payment-request-service:latest
    ports:
      - "8004:8003"
    env_file:
      - .env
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8003/health/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  webhook-service:
    image: ghcr.io/onyxpayments/webhook-service:latest
    command: ["python", "-m", "app.worker"]
    env_file:
      - .env
    environment:
      RABBITMQ_HOST: rabbitmq
    depends_on:
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_health"]
      interval: 10s
      timeout: 8s
      retries: 5
      start_period: 10s

  api-gateway:
    image: ghcr.io/onyxpayments/api-gateway:latest
    ports:
      - "8003:8002"
    env_file:
      - .env
    environment:
      PAYMENT_REQUEST_SERVICE_URL: http://payment-request-service:8003
    depends_on:
      payment-request-service:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8002/health/ready', timeout=2)
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  payment-frontend:
    image: ghcr.io/onyxpayments/payment-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      api-gateway:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - wget
        - --quiet
        - --output-document=/dev/null
        - http://localhost/health/ready
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  orchestrator-db:
    image: postgres:17
    ports:
      - "5433:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - transactions_data:/var/lib/postgresql/data
      - ./postgres/transactions/init:/docker-entrypoint-initdb.d
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # conexión de aplicaciones
      - "15672:15672"   # interfaz web
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - loki
      - orchestrator-db

  loki:
    image: grafana/loki:3.7.0
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./observability/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki

  alloy:
    image: grafana/alloy:latest
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    ports:
      - "12345:12345"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./observability/config.alloy:/etc/alloy/config.alloy:ro
      - alloy_data:/var/lib/alloy/data
    depends_on:
      - loki

volumes:
  transactions_data:
  rabbitmq_data:
  webhooks_data:
  grafana_data:
  loki_data:
  alloy_data:
